<title>NEW ME 캠프 교사 피드백 설문</title>
<style>
  :root{
    --deep:#2F5233; --deep2:#3E6B44; --sage:#9CAF88; --sage-l:#E4EBDC;
    --cream:#FBF6EC; --amber:#D98E32; --amber-l:#F6E3C8;
    --ink:#2A2A26; --gray:#7A7A72; --line:#DDDDD2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--cream); color:var(--ink);}
  .wrap{max-width:560px; margin:0 auto; padding:0 18px 60px;}

  header{background:var(--deep); color:#fff; padding:26px 18px 22px; border-bottom:4px solid var(--amber);}
  header .hin{max-width:560px; margin:0 auto;}
  header h1{margin:0 0 6px; font-size:1.25rem; letter-spacing:-.02em;}
  header p{margin:0; font-size:.8rem; color:#DCE5D6;}

  .card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px 18px; margin-top:18px; box-shadow:0 1px 3px rgba(47,82,51,.06);}
  .intro{font-size:.88rem; line-height:1.65; color:#555;}

  /* progress */
  .prog{position:sticky; top:0; z-index:10; background:var(--cream); padding:12px 0 8px;}
  .prog .bar{height:8px; background:#EAE5D8; border-radius:99px; overflow:hidden;}
  .prog .fill{height:100%; background:var(--amber); border-radius:99px; transition:width .3s;}
  .prog .lab{display:flex; justify-content:space-between; font-size:.72rem; color:var(--gray); margin-top:5px;}

  .sec-tag{display:inline-block; background:var(--deep); color:#fff; font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:99px; margin-bottom:8px;}
  .sec-title{font-size:1.08rem; font-weight:800; margin:0 0 4px; color:var(--deep);}
  .sec-desc{font-size:.8rem; color:var(--gray); margin:0 0 6px;}
  .sub{font-size:.85rem; font-weight:800; color:var(--amber); margin:22px 0 2px;}

  .q{margin-top:18px; padding-top:16px; border-top:1px dashed var(--line);}
  .q:first-of-type{border-top:none; padding-top:4px;}
  .q .qt{font-size:1.05rem; font-weight:700; line-height:1.55; margin-bottom:10px;}
  .q .qt .req{color:var(--amber);}
  .q .hint{font-size:.8rem; color:var(--gray); margin:-6px 0 8px;}

  .scale{display:flex; gap:5px; max-width:320px;}
  .scale button{flex:1; padding:8px 0; border:1.5px solid var(--line); background:#fff; border-radius:8px; font-size:.88rem; font-weight:700; color:#888; cursor:pointer; transition:.15s;}
  .scale button.on{background:var(--deep); border-color:var(--deep); color:#fff;}
  .scale-lab{display:flex; justify-content:space-between; font-size:.68rem; color:var(--gray); margin-top:4px; padding:0 2px; max-width:320px;}
  .q.miss .qt{color:#B4472F;}
  .q.miss .scale button{border-color:#E0B4A8;}

  textarea{width:100%; min-height:90px; border:1.5px solid var(--line); border-radius:10px; padding:11px; font-size:1rem; font-family:inherit; resize:vertical; background:#FFFDF8;}
  textarea:focus{outline:none; border-color:var(--sage);}

  .nav{display:flex; gap:10px; margin-top:24px;}
  .btn{flex:1; padding:15px 0; border:none; border-radius:12px; font-size:1rem; font-weight:800; cursor:pointer;}
  .btn.prev{background:#EDEAE0; color:#666;}
  .btn.next{background:var(--deep); color:#fff;}
  .btn.submit{background:var(--amber); color:#fff;}
  .btn:disabled{opacity:.5;}

  .done{text-align:center; padding:48px 20px;}
  .done .ico{font-size:2.6rem;}
  .done h2{color:var(--deep); margin:12px 0 8px;}
  .done p{color:#666; font-size:.9rem; line-height:1.7;}

  /* admin */
  .admin-link{display:block; text-align:center; margin-top:26px; font-size:.72rem; color:#BBB; text-decoration:none;}
  .stat-row{margin-top:14px;}
  .stat-row .st{font-size:.82rem; margin-bottom:4px; display:flex; justify-content:space-between; gap:8px;}
  .stat-row .st b{color:var(--deep); white-space:nowrap;}
  .stat-bar{height:10px; background:#EFEBDF; border-radius:99px; overflow:hidden;}
  .stat-bar .f{height:100%; background:var(--sage); border-radius:99px;}
  .stat-bar .f.hi{background:var(--deep);}
  .stat-bar .f.lo{background:var(--amber);}
  .open-item{background:var(--cream); border-left:3px solid var(--sage); border-radius:0 8px 8px 0; padding:10px 12px; margin-top:8px; font-size:.85rem; line-height:1.6; white-space:pre-wrap;}
  .count-badge{display:inline-block; background:var(--amber-l); color:#8A5A1A; font-weight:800; border-radius:99px; padding:6px 14px; font-size:.9rem;}
  input[type=password]{width:100%; padding:13px; border:1.5px solid var(--line); border-radius:10px; font-size:1rem;}
  h3.aq{font-size:.9rem; color:var(--deep); margin:26px 0 2px;}
</style>

const answers = {};
let step = -1; // -1: intro
const app = document.getElementById("app");
const isAdmin = new URLSearchParams(location.search).get("mode") === "admin";

function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- 설문 화면 ---------------- */
function renderIntro(){
  app.innerHTML = `
   <div class="card">
     <p class="intro">섬겨주신 선생님들께 진심으로 감사드립니다.<br>
     이번 캠프를 돌아보고 내년을 더 잘 준비하기 위한 설문입니다.<br><br>
     · 설문은 <b>무기명</b>으로 진행됩니다.<br>
     · 척도 문항은 필수, 서술 문항은 선택입니다.<br>
     · 소요 시간은 약 <b>10분</b>입니다.</p>
     <div class="nav"><button class="btn next" onclick="go(0)">설문 시작하기</button></div>
   </div>
   <a class="admin-link" href="?mode=admin">결과 보기(관리자)</a>`;
}

function renderSection(){
  const sec = SECTIONS[step];
  const pct = Math.round((step)/SECTIONS.length*100);
  let html = `
   <div class="prog">
     <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
     <div class="lab"><span>${sec.tag} · ${esc(sec.title)}</span><span>${pct}%</span></div>
   </div>
   <div class="card">
     <span class="sec-tag">섹션 ${sec.tag}</span>
     <h2 class="sec-title">${esc(sec.title)}</h2>
     ${sec.desc?`<p class="sec-desc">${esc(sec.desc)}</p>`:""}`;
  for(const it of sec.items){
    if(it.sub){ html += `<div class="sub">〈 ${esc(it.sub)} 〉</div>`; continue; }
    if(it.open){
      html += `<div class="q"><div class="qt">${esc(it.t)}</div>
        ${it.hint?`<div class="hint">※ ${esc(it.hint)}</div>`:""}
        <textarea id="${it.id}" placeholder="자유롭게 적어주세요 (선택)">${answers[it.id]?esc(answers[it.id]):""}</textarea></div>`;
    }else{
      html += `<div class="q" id="wrap_${it.id}"><div class="qt">${esc(it.t)} <span class="req">*</span></div>
        <div class="scale">${[1,2,3,4,5].map(n=>
          `<button type="button" class="${answers[it.id]===n?'on':''}" onclick="pick('${it.id}',${n})">${n}</button>`).join("")}
        </div>
        <div class="scale-lab"><span>전혀 아니다</span><span>매우 그렇다</span></div></div>`;
    }
  }
  const last = step === SECTIONS.length-1;
  html += `<div class="nav">
     ${step>0?`<button class="btn prev" onclick="go(${step-1})">이전</button>`:""}
     <button class="btn ${last?'submit':'next'}" onclick="${last?'submit()':'go('+(step+1)+')'}">${last?'제출하기':'다음'}</button>
   </div></div>`;
  app.innerHTML = html;
  window.scrollTo(0,0);
}

window.pick = (id,n)=>{
  answers[id]=n;
  const w = document.getElementById("wrap_"+id);
  if(w){
    w.classList.remove("miss");
    w.querySelectorAll(".scale button").forEach((b,i)=>{
      b.classList.toggle("on", i+1===n);
    });
  }
};
window.go = (n)=>{
  if(n > step && step >= 0 && !validate()) return;
  saveOpens();
  step = n; renderSection();
};
function saveOpens(){
  if(step<0) return;
  for(const it of SECTIONS[step].items){
    if(it.open){ const el=document.getElementById(it.id); if(el) answers[it.id]=el.value.trim(); }
  }
}
function validate(){
  let ok = true;
  for(const it of SECTIONS[step].items){
    if(!it.open && !it.sub && !answers[it.id]){
      ok = false;
      const w = document.getElementById("wrap_"+it.id);
      if(w){ w.classList.add("miss"); }
    }
  }
  if(!ok){
    const first = document.querySelector(".q.miss");
    if(first) first.scrollIntoView({behavior:"smooth", block:"center"});
    alert("아직 응답하지 않은 척도 문항이 있어요. 표시된 문항을 확인해 주세요.");
  }
  return ok;
}

window.submit = async ()=>{
  if(!validate()) return;
  saveOpens();
  const payload = { ts: Date.now(), dateStr: new Date().toLocaleString("ko-KR"), answers };
  if(!db){
    alert("파이어베이스 설정이 아직 입력되지 않았습니다.\n(index.html 상단의 firebaseConfig를 채워주세요)");
    return;
  }
  const btn = document.querySelector(".btn.submit");
  btn.disabled = true; btn.textContent = "제출 중...";
  try{
    await db.ref(DB_PATH).push(payload);
    app.innerHTML = `<div class="card done">
      <div class="ico">🌱</div>
      <h2>제출이 완료되었습니다</h2>
      <p>끝까지 응답해 주셔서 감사합니다.<br>선생님의 헌신이 아이들의 여름을 바꾸었습니다.</p></div>`;
    window.scrollTo(0,0);
  }catch(e){
    btn.disabled=false; btn.textContent="제출하기";
    alert("제출 중 오류가 발생했습니다. 네트워크를 확인하고 다시 시도해 주세요.\n"+e.message);
  }
};

/* ---------------- 관리자 화면 ---------------- */
function renderAdminLogin(){
  app.innerHTML = `<div class="card">
    <h2 class="sec-title">결과 보기 (관리자)</h2>
    <p class="sec-desc">비밀번호를 입력하세요.</p>
    <input type="password" id="pw" placeholder="비밀번호">
    <div class="nav">
      <button class="btn prev" onclick="location.href=location.pathname">돌아가기</button>
      <button class="btn next" onclick="adminLogin()">확인</button>
    </div></div>`;
  document.getElementById("pw").addEventListener("keydown",e=>{ if(e.key==="Enter") adminLogin(); });
}
window.adminLogin = ()=>{
  if(document.getElementById("pw").value === ADMIN_PW) loadResults();
  else alert("비밀번호가 올바르지 않습니다.");
};

async function loadResults(){
  if(!db){ alert("파이어베이스 설정이 필요합니다."); return; }
  app.innerHTML = `<div class="card"><p class="intro">결과를 불러오는 중...</p></div>`;
  const snap = await db.ref(DB_PATH).once("value");
  const data = snap.val() || {};
  const rows = Object.values(data);
  const n = rows.length;

  let html = `<div class="card">
    <h2 class="sec-title">설문 결과</h2>
    <p style="margin:10px 0 0"><span class="count-badge">응답 ${n}명</span></p></div>`;

  for(const sec of SECTIONS){
    html += `<div class="card"><span class="sec-tag">섹션 ${sec.tag}</span>
      <h2 class="sec-title">${esc(sec.title)}</h2>`;
    for(const it of sec.items){
      if(it.sub){ html += `<div class="sub">〈 ${esc(it.sub)} 〉</div>`; continue; }
      if(it.open){
        const texts = rows.map(r=>r.answers?.[it.id]).filter(v=>v && v.length>0);
        html += `<h3 class="aq">✎ ${esc(it.t)} <span style="color:var(--gray);font-weight:400">(${texts.length}건)</span></h3>`;
        html += texts.length
          ? texts.map(t=>`<div class="open-item">${esc(t)}</div>`).join("")
          : `<div class="open-item" style="color:var(--gray)">응답 없음</div>`;
      }else{
        const vals = rows.map(r=>r.answers?.[it.id]).filter(v=>typeof v==="number");
        const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
        const cls = avg>=4 ? "hi" : (avg>0 && avg<3 ? "lo" : "");
        html += `<div class="stat-row">
          <div class="st"><span>${esc(it.t)}</span><b>${vals.length?avg.toFixed(2):"-"} / 5</b></div>
          <div class="stat-bar"><div class="f ${cls}" style="width:${avg/5*100}%"></div></div>
        </div>`;
      }
    }
    html += `</div>`;
  }
  html += `<div class="nav" style="max-width:560px;margin:20px auto 0">
     <button class="btn prev" onclick="location.href=location.pathname">설문 화면으로</button>
     <button class="btn next" onclick="downloadCSV()">CSV 내려받기</button></div>`;
  app.innerHTML = html;
  window._rows = rows;
}

window.downloadCSV = ()=>{
  const rows = window._rows || [];
  const ids = [], titles = [];
  for(const sec of SECTIONS) for(const it of sec.items){ if(!it.sub){ ids.push(it.id); titles.push(it.t); } }
  const head = ["제출시각", ...titles].map(t=>`"${t.replace(/"/g,'""')}"`).join(",");
  const lines = rows.map(r=>{
    const cells = [r.dateStr||"", ...ids.map(id=>{
      const v = r.answers?.[id]; return v===undefined?"":String(v);
    })];
    return cells.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",");
  });
  const blob = new Blob(["\uFEFF"+[head,...lines].join("\n")], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "NEW_ME_캠프_교사설문_결과.csv";
  a.click();
};

/* ---------------- 시작 ---------------- */
if(isAdmin) renderAdminLogin();
else renderIntro();
</script>
