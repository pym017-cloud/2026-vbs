  return e("div",{style:{borderRadius:12,overflow:"hidden",marginBottom:10,border:"1px solid "+song.colorL}},
    e("div",{style:{background:song.colorL,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}},
      e("div",{style:{fontSize:22}},"🎵"),
      e("div",{style:{flex:1}},
        e("div",{style:{fontWeight:700,fontSize:14,color:song.colorD}},song.title),
        e("audio",{controls:true,style:{width:"100%",marginTop:6,height:32},src:song.file})
      ),
      e("button",{onClick:()=>setOpen(o=>!o),style:{background:song.color,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}},open?"가사 닫기":"가사 보기")
    ),
    open&&e("div",{style:{background:"#fff",padding:"14px 16px",whiteSpace:"pre-line",fontSize:13,lineHeight:2,color:"#334155",borderTop:"1px solid "+song.colorL}},song.lyrics)
  );
}

// ── 인라인 수정 가능한 일정 행 ────────────────────────────
function SchedRow({item, onSave, onDelete, isLast}){
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({...item});

  function save(){
    const tagMeta = TAG_COLORS[draft.tag]||TAG_COLORS[""];
    onSave({...draft, tagColor:tagMeta.tc, tagBg:tagMeta.bg});
    setEditing(false);
  }
  function cancel(){ setDraft({...item}); setEditing(false); }

  const rowBase = {borderBottom:isLast?"none":"1px solid #F1F5F9", padding:"10px 0"};

  if(editing) return e("div",{style:{...rowBase, background:"#F8FAFC", borderRadius:10, padding:"10px 10px", margin:"4px 0"}},
    // time + icon row
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}},
      e("input",{
        value:draft.time, onChange:ev=>setDraft(d=>({...d,time:ev.target.value})),
        placeholder:"시간 (예: 09:00)",
        style:{padding:"7px 10px",borderRadius:8,border:"1px solid #CBD5E1",fontSize:13,outline:"none"}
      }),
      e("input",{
        value:draft.dur, onChange:ev=>setDraft(d=>({...d,dur:ev.target.value})),
        placeholder:"소요시간 (예: 40분)",
        style:{padding:"7px 10px",borderRadius:8,border:"1px solid #CBD5E1",fontSize:13,outline:"none"}
      })
    ),
    // prog
    e("input",{
      value:draft.prog, onChange:ev=>setDraft(d=>({...d,prog:ev.target.value})),
      placeholder:"프로그램명",
      style:{width:"100%",padding:"7px 10px",borderRadius:8,border:"1px solid #CBD5E1",fontSize:13,outline:"none",marginBottom:8}
    }),
    // icon + tag row
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}},
      e("div",null,
        e("div",{style:{fontSize:11,color:"#94A3B8",marginBottom:4}},"아이콘"),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},
          ICONS.map(ic=>e("button",{key:ic,onClick:()=>setDraft(d=>({...d,icon:ic})),
            style:{width:30,height:30,borderRadius:6,border:"2px solid "+(draft.icon===ic?"#38BDF8":"#E2E8F0"),
                   background:draft.icon===ic?"#E0F7FF":"#fff",cursor:"pointer",fontSize:14}},ic))
        )
      ),
      e("div",null,
        e("div",{style:{fontSize:11,color:"#94A3B8",marginBottom:4}},"구분 태그"),
        e("select",{
          value:draft.tag,
          onChange:ev=>setDraft(d=>({...d,tag:ev.target.value})),
          style:{width:"100%",padding:"7px 10px",borderRadius:8,border:"1px solid #CBD5E1",fontSize:13,outline:"none",background:"#fff"}
        },
          TAG_OPTIONS.map(t=>e("option",{key:t,value:t},t||"(없음)"))
        )
      )
    ),
    // action buttons
    e("div",{style:{display:"flex",gap:6}},
      e("button",{onClick:save,style:{flex:1,background:"linear-gradient(135deg,#1E3A5F,#2D6A9F)",color:"#fff",border:"none",borderRadius:8,padding:"8px 0",fontWeight:600,cursor:"pointer",fontSize:13}},"✓ 저장"),
      e("button",{onClick:cancel,style:{padding:"8px 14px",borderRadius:8,border:"1px solid #E2E8F0",background:"#fff",cursor:"pointer",fontSize:13,color:"#64748B"}},"취소"),
      e("button",{onClick:()=>onDelete(item.id),style:{padding:"8px 14px",borderRadius:8,border:"none",background:"#FEE2E2",cursor:"pointer",fontSize:13,color:"#991B1B"}},"삭제")
    )
  );

  const tagMeta = TAG_COLORS[item.tag]||TAG_COLORS[""];
  return e("div",{style:{...rowBase,display:"flex",gap:10,alignItems:"center"}},
    e("div",{style:{minWidth:56,fontSize:12,color:C.tm,flexShrink:0}},item.time),
    e("div",{style:{fontSize:16,flexShrink:0}},item.icon),
    e("div",{style:{flex:1,minWidth:0}},
      e("div",{style:{fontSize:14,fontWeight:500,color:C.td,lineHeight:1.4}},item.prog),
      e("div",{style:{display:"flex",gap:6,marginTop:3,alignItems:"center",flexWrap:"wrap"}},
        item.dur && e("span",{style:{fontSize:11,color:C.tl}},item.dur),
        item.tag && e("span",{style:{...pill(tagMeta.bg,tagMeta.tc),fontSize:10,padding:"2px 7px"}},item.tag)
      )
    ),
    e("button",{onClick:()=>setEditing(true),
      style:{background:"none",border:"1px solid #E2E8F0",borderRadius:7,cursor:"pointer",fontSize:12,color:C.tm,padding:"4px 8px",flexShrink:0,whiteSpace:"nowrap"}
    },"✏️ 수정")
  );
}

function App(){
  const [tab,setTab]=useState("home");
  const [cl,setCl]=useState(DEFAULT_CL);
  const [coms,setComs]=useState([]);
  const [sched,setSched]=useState([]);
  const [name,setName]=useState("");
  const [msg,setMsg]=useState("");
  const [cd,setCd]=useState("");
  const [connected,setConnected]=useState(false);
  const [toast,setToast]=useState(null);
  const [wordIdx,setWordIdx]=useState(0);
  const [schedForm,setSchedForm]=useState({day:"",time:"",prog:"",icon:"📋",dur:"",tag:""});
  const [showAddForm,setShowAddForm]=useState(false);
  const [presetLoaded,setPresetLoaded]=useState(false);
  const db=useRef(null);
  const toastTimer=useRef(null);

  function showToast(m,type="ok"){
    if(toastTimer.current) clearTimeout(toastTimer.current);
    setToast({m,type});
    toastTimer.current=setTimeout(()=>setToast(null),2500);
  }

  useEffect(()=>{
    try{
      const app=firebase.apps.length?firebase.app():firebase.initializeApp(FIREBASE_CONFIG);
      db.current=firebase.database(app);
      db.current.ref(".info/connected").on("value",s=>setConnected(!!s.val()));
      db.current.ref("checklist").on("value",s=>{
        const v=s.val();
        if(v) setCl(Array.isArray(v)?v:Object.values(v));
        else db.current.ref("checklist").set(DEFAULT_CL);
      });
      db.current.ref("comments").on("value",s=>{
        const v=s.val();
        setComs(v?Object.values(v).sort((a,b)=>a.id-b.id):[]);
      });
      db.current.ref("schedule").on("value",s=>{
        const v=s.val();
        if(v){
          const arr=Array.isArray(v)?v:Object.values(v);
          setSched(arr);
          setPresetLoaded(true);
        }
      });
    }catch(err){showToast("Firebase 오류: "+err.message,"err");}
    return()=>{
      if(db.current){
        ["checklist","comments","schedule",".info/connected"].forEach(r=>db.current.ref(r).off());
      }
    };
  },[]);

  useEffect(()=>{
    const target=new Date("2026-07-17T09:00:00");
    const tick=()=>{
      const diff=target-new Date();
      if(diff<=0){setCd("D-Day! 🎉");return;}
      const d=Math.floor(diff/86400000);
      const h=Math.floor((diff%86400000)/3600000);
      const m=Math.floor((diff%3600000)/60000);
      setCd("D-"+d+"일 "+h+"시간 "+m+"분");
    };
    tick();
    const iv=setInterval(tick,60000);
    return()=>clearInterval(iv);
  },[]);

  async function check(id){
    const updated=cl.map(c=>c.id===id?{...c,done:!c.done}:c);
    if(db.current) await db.current.ref("checklist").set(updated);
    else setCl(updated);
    showToast("저장되었습니다 ✓");
  }

  async function addCom(){
    if(!name.trim()||!msg.trim()) return;
    const now=new Date();
    const tt=(now.getMonth()+1)+"/"+now.getDate()+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    const id=Date.now();
    if(db.current) await db.current.ref("comments/"+id).set({id,name:name.trim(),time:tt,text:msg.trim()});
    setMsg("");
    showToast("댓글이 등록되었습니다 💬");
  }

  async function delCom(id){
    if(db.current) await db.current.ref("comments/"+id).remove();
    showToast("삭제되었습니다");
  }

  // 프리셋 불러오기
  async function loadPreset(){
    if(!window.confirm("확정 시간표(23개 항목)를 불러옵니다.\n현재 일정이 모두 교체됩니다. 계속할까요?")) return;
    const tagged=PRESET_SCHEDULE.map(it=>{
      const meta=TAG_COLORS[it.tag]||TAG_COLORS[""];
      return {...it,tagColor:meta.tc,tagBg:meta.bg};
    });
    if(db.current) await db.current.ref("schedule").set(tagged);
    else setSched(tagged);
    setPresetLoaded(true);
    showToast("확정 시간표가 불러와졌습니다 📅");
  }

  // 일정 추가
  async function addSched(){
    if(!schedForm.day.trim()||!schedForm.time.trim()||!schedForm.prog.trim()){
      showToast("날짜·시간·프로그램을 모두 입력해주세요","err"); return;
    }
    const id=Date.now();
    const meta=TAG_COLORS[schedForm.tag]||TAG_COLORS[""];
    const item={...schedForm,id,tagColor:meta.tc,tagBg:meta.bg};
    const updated=[...sched,item].sort((a,b)=>a.day.localeCompare(b.day)||a.time.localeCompare(b.time));
    if(db.current) await db.current.ref("schedule").set(updated);
    else setSched(updated);
    setSchedForm({day:"",time:"",prog:"",icon:"📋",dur:"",tag:""});
    setShowAddForm(false);
    showToast("일정이 추가되었습니다 📅");
  }

  // 일정 수정 저장
  async function saveSched(updated_item){
    const updated=sched.map(s=>s.id===updated_item.id?updated_item:s)
      .sort((a,b)=>a.day.localeCompare(b.day)||a.time.localeCompare(b.time));
    if(db.current) await db.current.ref("schedule").set(updated);
    else setSched(updated);
    showToast("수정되었습니다 ✓");
  }

  // 일정 삭제
  async function delSched(id){
    const updated=sched.filter(s=>s.id!==id);
    if(db.current) await db.current.ref("schedule").set(updated.length?updated:null);
    else setSched(updated);
    showToast("삭제되었습니다");
  }

  // 전체 초기화
  async function clearAll(){
    if(!window.confirm("모든 일정을 삭제합니다. 되돌릴 수 없습니다.")) return;
    if(db.current) await db.current.ref("schedule").remove();
    else setSched([]);
    setPresetLoaded(false);
    showToast("전체 삭제되었습니다");
  }

  function download(){
    const html=document.documentElement.outerHTML;
    const blob=new Blob([html],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="index.html";
    a.click();
  }

  const done=cl.filter(c=>c.done).length;
  const pct=Math.round(done/cl.length*100);
  const cats=[...new Set(cl.map(c=>c.cat))];
  const w=WORDS[wordIdx];
  const days=[...new Set(sched.map(s=>s.day))];

  const TABS=[
    {id:"home",label:"홈",e:"🏠"},
    {id:"sessions",label:"세션",e:"📖"},
    {id:"schedule",label:"일정표",e:"📅"},
    {id:"checklist",label:"준비물",e:"✅"},
    {id:"resources",label:"자료실",e:"📂"},
    {id:"board",label:"게시판",e:"💬"},
  ];

  const card={background:C.white,borderRadius:14,padding:"1rem 1.2rem",marginBottom:12,boxShadow:"0 1px 8px rgba(0,0,0,0.07)"};
  const inp={width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:14,outline:"none",background:"#fff"};
  const progBar={background:"#E2E8F0",borderRadius:99,height:10,overflow:"hidden"};
  const progFill=w=>({background:"linear-gradient(90deg,"+C.mint+","+C.sky+")",height:"100%",borderRadius:99,width:w+"%",transition:"width .4s"});

  return e("div",{style:{maxWidth:640,margin:"0 auto"}},

    // Toast
    toast&&e("div",{className:"toast",style:{background:toast.type==="err"?C.coralD:C.mintD}},toast.m),

    // 다운로드
    e("div",{style:{textAlign:"right",marginBottom:8}},
      e("button",{onClick:download,style:{background:C.td,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:600,cursor:"pointer",fontSize:13}},"⬇️ HTML 다운로드")
    ),

    // 헤더
    e("div",{style:{background:"linear-gradient(135deg,#1E3A5F,#2D6A9F,#5BA4CF)",borderRadius:20,padding:"2rem 1.5rem 1.5rem",marginBottom:12,textAlign:"center",color:"#fff"}},
      e("div",{style:{fontSize:13,fontWeight:700,opacity:.95,marginBottom:2,letterSpacing:1}},"순천침례교회"),
      e("div",{style:{fontSize:12,opacity:.8,marginBottom:4,letterSpacing:1}},"2026 교육부 연합캠프"),
      e("div",{style:{fontSize:28,fontWeight:900,letterSpacing:-0.5}},"NEW ME ✨"),
      e("div",{style:{fontSize:13,opacity:.9,marginTop:4,fontWeight:600}},"새로운 나, 새로운 우리"),
      e("div",{style:{fontSize:22,fontWeight:900,letterSpacing:1,marginTop:10,background:"rgba(255,255,255,.2)",borderRadius:14,padding:"8px 24px",display:"inline-block"}},"2026. 7. 17 — 18"),
      e("div",{style:{fontSize:12,fontStyle:"italic",opacity:.8,marginTop:8,lineHeight:1.6}},"고린도후서 5:17 — 그런즉 누구든지 그리스도 안에 있으면 새로운 피조물이라"),
      e("div",{style:{display:"flex",justifyContent:"center",gap:8,marginTop:10,flexWrap:"wrap"}},
        ["초등부","중등부","고등부"].map(d=>e("span",{key:d,style:{background:"rgba(255,255,255,.2)",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600}},d))
      ),
      e("div",{style:{display:"inline-block",background:"rgba(255,255,255,.2)",borderRadius:30,padding:"6px 18px",fontSize:14,fontWeight:600,marginTop:10}},"⏳ "+cd)
    ),

    // 연결 상태
    e("div",{style:{background:connected?C.mintL:C.sunL,borderRadius:10,padding:"8px 14px",marginBottom:12,fontSize:12,color:connected?C.mintD:C.sunD}},
      connected?"🟢 Firebase 실시간 연결됨 — 모든 교사와 동기화 중":"🟡 서버에 연결 중..."
    ),

    // 탭
    e("div",{style:{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}},
      TABS.map(t=>e("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:"1 1 auto",padding:"8px 4px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:tab===t.id?600:400,background:tab===t.id?C.td:C.white,color:tab===t.id?"#fff":C.tm,boxShadow:tab===t.id?"none":"0 1px 4px rgba(0,0,0,.08)"}},t.e+" "+t.label))
    ),

    // ── 홈 ──
    tab==="home"&&e("div",null,
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        [{label:"총 세션",val:"6개",ic:"📖",bg:C.skyL,tc:C.skyD},
         {label:"준비 완료",val:pct+"%",ic:"✅",bg:C.mintL,tc:C.mintD},
         {label:"대상 부서",val:"3부서",ic:"👥",bg:C.purL,tc:C.purD},
         {label:"게시판",val:coms.length+"개",ic:"💬",bg:C.sunL,tc:C.sunD}].map((x,i)=>
          e("div",{key:i,style:{background:x.bg,borderRadius:12,padding:"1rem",textAlign:"center"}},
            e("div",{style:{fontSize:24}},x.ic),
            e("div",{style:{fontSize:20,fontWeight:700,color:x.tc}},x.val),
            e("div",{style:{fontSize:12,color:x.tc,opacity:.8}},x.label)
          )
        )
      ),
      e("div",{style:card},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:10}},"📊 준비물 진행 현황"),
        e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:C.tm,marginBottom:4}},
          e("span",null,done+" / "+cl.length+" 완료"),
          e("span",{style:{fontWeight:700,color:C.mintD}},pct+"%")
        ),
        e("div",{style:progBar},e("div",{style:progFill(pct)}))
      ),
      e("div",{style:card},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:10}},"📖 핵심 말씀"),
        e("div",{style:{background:w.colorL,borderRadius:10,padding:"1rem 1.2rem",borderLeft:"4px solid "+w.color,marginBottom:10}},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
            e("span",{style:{fontSize:13,color:w.colorD,fontWeight:700}},w.ref),
            e("span",{style:pill(w.colorL,w.colorD)},w.label)
          ),
          e("div",{style:{fontSize:14,color:C.td,lineHeight:1.8}},w.text)
        ),
        e("div",{style:{display:"flex",gap:6,justifyContent:"center"}},
          WORDS.map((_,i)=>e("button",{key:i,onClick:()=>setWordIdx(i),style:{width:32,height:32,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:11,fontWeight:wordIdx===i?700:400,background:wordIdx===i?C.td:C.white,color:wordIdx===i?"#fff":C.tm,boxShadow:"0 1px 4px rgba(0,0,0,.1)"}},(i+1)+"막"))
        )
      ),
      e("div",{style:card},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:12}},"🎭 캠프 3막 구조"),
        [{act:"1막",title:"정체성 발견",desc:"나는 누구인가 — 하나님 안의 정체성",color:C.sky,colorL:C.skyL},
         {act:"2막",title:"변화의 과정",desc:"세상이 아닌 하나님의 기준으로 마음 갱신",color:C.pur,colorL:C.purL},
         {act:"3막",title:"열매 맺는 삶",desc:"성령의 열매로 흘러나오는 새로운 나",color:C.mint,colorL:C.mintL}].map((m,i)=>
          e("div",{key:i,style:{display:"flex",gap:12,padding:"10px 0",borderBottom:i<2?"1px solid #F1F5F9":"none",alignItems:"center"}},
            e("div",{style:{width:40,height:40,borderRadius:10,background:m.colorL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:m.color,flexShrink:0}},m.act),
            e("div",null,
              e("div",{style:{fontWeight:700,fontSize:14}},m.title),
              e("div",{style:{fontSize:12,color:C.tm,marginTop:2}},m.desc)
            )
          )
        )
      )
    ),

    // ── 세션 ──
    tab==="sessions"&&e("div",null,
      SESSIONS.map((s,si)=>
        e("div",{key:si,style:card},
          e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14}},
            e("div",{style:{width:36,height:36,borderRadius:10,background:s.colorL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:s.color}},s.act),
            e("div",{style:{fontSize:16,fontWeight:700}},s.title)
          ),
          s.items.map((it,ii)=>
            e("div",{key:ii,style:{background:s.colorL,borderRadius:12,padding:"1rem",marginBottom:ii<s.items.length-1?10:0}},
              e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
                e("span",{style:{fontSize:20}},it.icon),
                e("div",null,
                  e("div",{style:{fontSize:13,color:s.colorD,fontWeight:700}},it.no),
                  e("div",{style:{fontSize:15,fontWeight:700,color:C.td}},it.title)
                ),
                e("span",{style:{...pill(s.color+"33",s.colorD),marginLeft:"auto",fontSize:10}},it.keyword)
              ),
              e("div",{style:{fontSize:12,color:C.tm,lineHeight:1.6,marginBottom:6}},it.desc),
              e("div",{style:{fontSize:12,color:s.colorD,fontWeight:600}},"📖 "+it.verse)
            )
          )
        )
      ),
      e("div",{style:{...card,background:C.purL}},
        e("div",{style:{fontSize:14,fontWeight:700,color:C.purD,marginBottom:10}},"✦ 캠프 설계 원칙"),
        [{n:"①",t:"지식 → 경험 → 결단",d:"말씀 강의 · 소그룹 나눔 · 개인 결단 3단계"},
         {n:"②",t:"연령별 심화",d:"초등(이야기) · 중등(질문) · 고등(논증) 중심"},
         {n:"③",t:"일상 연결",d:"세션마다 '이번 주 실천 카드' 제공"}].map((p,i)=>
          e("div",{key:i,style:{display:"flex",gap:10,padding:"8px 0",borderBottom:i<2?"1px solid "+C.pur+"44":"none"}},
            e("div",{style:{fontWeight:700,color:C.pur,fontSize:14,flexShrink:0}},p.n),
            e("div",null,
              e("div",{style:{fontSize:13,fontWeight:700,color:C.purD}},p.t),
              e("div",{style:{fontSize:12,color:C.tm,marginTop:2}},p.d)
            )
          )
        )
      )
    ),

    // ── 일정표 ──
    tab==="schedule"&&e("div",null,

      // 상단 액션 바
      e("div",{style:{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}},
        e("button",{onClick:loadPreset,
          style:{flex:"1 1 auto",background:"linear-gradient(135deg,#1E3A5F,#2D6A9F)",color:"#fff",border:"none",borderRadius:10,padding:"10px 8px",fontWeight:700,cursor:"pointer",fontSize:13}},
          "📥 확정 시간표 불러오기"
        ),
        e("button",{onClick:()=>setShowAddForm(f=>!f),
          style:{flex:"1 1 auto",background:showAddForm?C.td:C.white,color:showAddForm?"#fff":C.td,border:"1px solid #E2E8F0",borderRadius:10,padding:"10px 8px",fontWeight:600,cursor:"pointer",fontSize:13}},
          showAddForm?"✕ 닫기":"➕ 항목 추가"
        ),
        sched.length>0&&e("button",{onClick:clearAll,
          style:{padding:"10px 12px",background:"#FEE2E2",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,color:"#991B1B",fontWeight:600}},
          "🗑 전체 삭제"
        )
      ),

      // 추가 폼 (토글)
      showAddForm&&e("div",{style:{...card,border:"1px solid #E2E8F0"}},
        e("div",{style:{fontSize:15,fontWeight:700,marginBottom:12,color:C.td}},"➕ 새 일정 추가"),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
          e("input",{style:inp,placeholder:"날짜 (예: 7월 17일 (목))",value:schedForm.day,onChange:ev=>setSchedForm(f=>({...f,day:ev.target.value}))}),
          e("input",{style:inp,placeholder:"시간 (예: 09:00)",value:schedForm.time,onChange:ev=>setSchedForm(f=>({...f,time:ev.target.value}))})
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
          e("input",{style:inp,placeholder:"프로그램명",value:schedForm.prog,onChange:ev=>setSchedForm(f=>({...f,prog:ev.target.value}))}),
          e("input",{style:inp,placeholder:"소요시간 (예: 40분)",value:schedForm.dur,onChange:ev=>setSchedForm(f=>({...f,dur:ev.target.value}))})
        ),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
          e("div",null,
            e("div",{style:{fontSize:12,color:C.tm,marginBottom:6}},"구분 태그"),
            e("select",{value:schedForm.tag,onChange:ev=>setSchedForm(f=>({...f,tag:ev.target.value})),
              style:{...inp,padding:"9px 10px"}},
              TAG_OPTIONS.map(t=>e("option",{key:t,value:t},t||"(없음)"))
            )
          ),
          e("div",null,
            e("div",{style:{fontSize:12,color:C.tm,marginBottom:6}},"아이콘"),
            e("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},
              ICONS.slice(0,14).map(ic=>e("button",{key:ic,onClick:()=>setSchedForm(f=>({...f,icon:ic})),
                style:{width:30,height:30,borderRadius:6,border:"2px solid "+(schedForm.icon===ic?C.sky:"#E2E8F0"),
                       background:schedForm.icon===ic?C.skyL:"#fff",cursor:"pointer",fontSize:14}},ic))
            )
          )
        ),
        e("button",{onClick:addSched,style:{background:"linear-gradient(135deg,#1E3A5F,#2D6A9F)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:600,cursor:"pointer",fontSize:14}},"일정 추가")
      ),

      // 빈 상태
      sched.length===0
        ?e("div",{style:{...card,textAlign:"center",padding:"3rem 1rem",color:C.tl}},
            e("div",{style:{fontSize:40,marginBottom:12}},"📅"),
            e("div",{style:{fontSize:15,fontWeight:600,marginBottom:6}},"아직 등록된 일정이 없어요"),
            e("div",{style:{fontSize:13,marginBottom:20}},"위에서 확정 시간표를 불러오거나 항목을 직접 추가하세요"),
            e("button",{onClick:loadPreset,
              style:{background:"linear-gradient(135deg,#1E3A5F,#2D6A9F)",color:"#fff",border:"none",borderRadius:10,padding:"12px 24px",fontWeight:700,cursor:"pointer",fontSize:14}},
              "📥 확정 시간표 불러오기"
            )
          )
        // 날짜별 그룹
        :e("div",null,
            e("div",{style:{fontSize:12,color:C.tl,marginBottom:10,textAlign:"right"}},
              "✏️ 항목을 클릭하면 바로 수정할 수 있어요"
            ),
            days.map((day,di)=>{
              const [dc,dcL,dcD]=DAY_COLORS[di%5];
              const items=sched.filter(s=>s.day===day);
              return e("div",{key:day,style:card},
                e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14}},
                  e("div",{style:{width:12,height:12,borderRadius:"50%",background:dc,flexShrink:0}}),
                  e("div",{style:{fontSize:16,fontWeight:700}},day),
                  e("span",{style:pill(dcL,dcD)},items.length+"개 프로그램")
                ),
                items.map((it,ii)=>
                  e(SchedRow,{
                    key:it.id,
                    item:it,
                    onSave:saveSched,
                    onDelete:delSched,
                    isLast:ii===items.length-1
                  })
                )
              );
            })
          )
    ),

    // ── 체크리스트 ──
    tab==="checklist"&&e("div",null,
      e("div",{style:{...card,marginBottom:12}},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",{style:{fontSize:14,fontWeight:600}},"전체 진행률"),
          e("span",{style:{fontWeight:700,color:C.mintD,fontSize:18}},pct+"%")
        ),
        e("div",{style:{...progBar,marginTop:8}},e("div",{style:progFill(pct)})),
        e("div",{style:{fontSize:12,color:C.tl,marginTop:6}},"체크하면 모든 교사에게 실시간 반영됩니다")
      ),
      cats.map(cat=>
        e("div",{key:cat,style:card},
          e("div",{style:{fontSize:16,fontWeight:700,marginBottom:10}},cat),
          cl.filter(c=>c.cat===cat).map(c=>
            e("div",{key:c.id,onClick:()=>check(c.id),style:{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #F1F5F9",opacity:c.done?.5:1,cursor:"pointer"}},
              e("div",{style:{width:20,height:20,borderRadius:6,border:"2px solid "+(c.done?C.mint:"#CBD5E1"),background:c.done?C.mint:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                c.done&&e("span",{style:{color:"#fff",fontSize:13,fontWeight:700}},"✓")
              ),
              e("span",{style:{fontSize:14,textDecoration:c.done?"line-through":"none"}},c.item)
            )
          )
        )
      )
    ),

    // ── 자료실 ──
    tab==="resources"&&e("div",null,
      e("div",{style:card},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:12}},"🎬 영상 자료"),
        e("div",{style:{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:10,overflow:"hidden"}},
          e("iframe",{src:"https://www.youtube.com/embed/miKvQ86PZ9I",title:"캠프 영상",frameBorder:"0",allow:"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture",allowFullScreen:true,style:{position:"absolute",top:0,left:0,width:"100%",height:"100%"}})
        )
      ),
      e("div",{style:card},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:14}},"🎵 주제 찬양"),
        SONGS.map((song,si)=>e(SongCard,{key:si,song,inp}))
      ),
      e("div",{style:card},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:14}},"📂 자료 목록"),
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}},
          RES.map((r,i)=>
            e("div",{key:i,style:{background:r.bg,borderRadius:12,padding:"1rem"}},
              e("div",{style:{fontSize:26,marginBottom:6}},r.icon),
              e("div",{style:{fontSize:13,fontWeight:700,color:r.tc}},r.title),
              e("div",{style:{fontSize:12,color:r.tc,opacity:.8,marginTop:2}},r.desc),
              e("div",{style:{marginTop:8}},e("span",{style:{...pill(r.tc+"22",r.tc),fontSize:10}},r.tag))
            )
          )
        )
      ),
      e("div",{style:card},
        e("div",{style:{fontSize:16,fontWeight:700,marginBottom:10}},"📌 안내 사항"),
        e("ul",{style:{paddingLeft:18,fontSize:14,lineHeight:2,color:C.tm}},
          e("li",null,"모든 자료는 캠프 2주 전까지 배포 예정입니다"),
          e("li",null,"자료 추가 요청은 교사 게시판에 남겨주세요"),
          e("li",null,"인쇄 자료는 캠프 1주 전 제공됩니다")
        )
      )
    ),

    // ── 게시판 ──
    tab==="board"&&e("div",{style:card},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        e("div",{style:{fontSize:16,fontWeight:700}},"💬 교사 게시판"),
        e("span",{style:pill(C.skyL,C.skyD)},coms.length+"개")
      ),
      e("div",{style:{fontSize:12,color:C.tl,marginBottom:14}},"모든 교사가 실시간으로 공유하는 게시판입니다"),
      coms.length===0&&e("div",{style:{textAlign:"center",padding:"2rem 0",color:C.tl,fontSize:14}},"첫 번째 댓글을 남겨보세요 😊"),
      coms.map(c=>
        e("div",{key:c.id,style:{background:C.gray,borderRadius:10,padding:"10px 12px",marginBottom:8}},
          e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
            e("span",{style:{fontWeight:700,fontSize:13}},"👤 "+c.name),
            e("div",{style:{display:"flex",alignItems:"center",gap:8}},
              e("span",{style:{fontSize:11,color:C.tl}},c.time),
              e("button",{onClick:()=>delCom(c.id),style:{background:"none",border:"none",cursor:"pointer",fontSize:12,color:C.tl,padding:0}},"✕")
            )
          ),
          e("div",{style:{fontSize:14,lineHeight:1.6}},c.text)
        )
      ),
      e("div",{style:{borderTop:"1px solid #F1F5F9",paddingTop:14,marginTop:4}},
        e("div",{style:{fontSize:14,fontWeight:600,marginBottom:10}},"✏️ 댓글 작성"),
        e("input",{style:{...inp,marginBottom:8},placeholder:"이름을 입력하세요",value:name,onChange:ev=>setName(ev.target.value)}),
        e("textarea",{style:{...inp,minHeight:80,marginBottom:10,display:"block"},placeholder:"내용을 입력하세요...",value:msg,onChange:ev=>setMsg(ev.target.value)}),
        e("button",{onClick:addCom,style:{background:"linear-gradient(135deg,#1E3A5F,#2D6A9F)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:600,cursor:"pointer",fontSize:14}},"댓글 등록")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body></html>
