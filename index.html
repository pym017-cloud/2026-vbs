                <span style={pill(w.colorL,w.colorD)}>{w.label}</span>
              </div>
              <div style={{fontSize:14,color:C.td,lineHeight:1.8}}>{w.text}</div>
            </div>
            <div style={{display:"flex",gap:6,justifyContent:"center"}}>
              {WORDS.map((_,i)=>(
                <button key={i} onClick={()=>setWordIdx(i)} style={{width:28,height:28,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:11,fontWeight:wordIdx===i?700:400,background:wordIdx===i?C.td:C.white,color:wordIdx===i?"#fff":C.tm,boxShadow:"0 1px 4px rgba(0,0,0,.1)"}}>
                  {i+1}막
                </button>
              ))}
            </div>
          </div>

          {/* 3막 구조 요약 */}
          <div style={card}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:12}}>🎭 캠프 3막 구조</div>
            {[
              {act:"1막",title:"정체성 발견",desc:"나는 누구인가 — 하나님 안의 정체성",color:C.sky,colorL:C.skyL},
              {act:"2막",title:"변화의 과정",desc:"세상이 아닌 하나님의 기준으로 마음 갱신",color:C.pur,colorL:C.purL},
              {act:"3막",title:"열매 맺는 삶",desc:"성령의 열매로 흘러나오는 새로운 나",color:C.mint,colorL:C.mintL},
            ].map((m,i)=>(
              <div key={i} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:i<2?"1px solid #F1F5F9":"none",alignItems:"center"}}>
                <div style={{width:40,height:40,borderRadius:10,background:m.colorL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:m.color,flexShrink:0}}>{m.act}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>{m.title}</div>
                  <div style={{fontSize:12,color:C.tm,marginTop:2}}>{m.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 세션 */}
      {tab==="sessions"&&(
        <div>
          {SESSIONS.map((s,si)=>(
            <div key={si} style={card}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                <div style={{width:36,height:36,borderRadius:10,background:s.colorL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:s.color}}>{s.act}</div>
                <div style={{fontSize:16,fontWeight:700}}>{s.act === "1막" ? "정체성 발견" : s.act === "2막" ? "변화의 과정" : "열매 맺는 삶"}</div>
              </div>
              {s.items.map((it,ii)=>(
                <div key={ii} style={{background:s.colorL,borderRadius:12,padding:"1rem",marginBottom:ii<s.items.length-1?10:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:20}}>{it.icon}</span>
                    <div>
                      <div style={{fontSize:13,color:s.colorD,fontWeight:700}}>{it.no}</div>
                      <div style={{fontSize:15,fontWeight:700,color:C.td}}>{it.title}</div>
                    </div>
                    <span style={{...pill(s.color+"33",s.colorD),marginLeft:"auto",fontSize:10}}>{it.keyword}</span>
                  </div>
                  <div style={{fontSize:12,color:C.tm,lineHeight:1.6,marginBottom:6}}>{it.desc}</div>
                  <div style={{fontSize:12,color:s.colorD,fontWeight:600}}>📖 {it.verse}</div>
                </div>
              ))}
            </div>
          ))}
          <div style={{...card,background:C.purL}}>
            <div style={{fontSize:14,fontWeight:700,color:C.purD,marginBottom:10}}>✦ 캠프 설계 원칙</div>
            {[
              {n:"①",t:"지식 → 경험 → 결단","d":"말씀 강의 · 소그룹 나눔 · 개인 결단 3단계"},
              {n:"②",t:"연령별 심화","d":"초등(이야기 중심) · 중등(질문 중심) · 고등(논증 중심)"},
              {n:"③",t:"일상 연결","d":"세션마다 '이번 주 실천 카드' 제공"},
            ].map((p,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<2?"1px solid "+C.pur+"44":"none"}}>
                <div style={{fontWeight:700,color:C.pur,fontSize:14,flexShrink:0}}>{p.n}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.purD}}>{p.t}</div>
                  <div style={{fontSize:12,color:C.tm,marginTop:2}}>{p.d}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 일정표 */}
      {tab==="schedule"&&(
        <div>
          {/* 일정 추가 폼 */}
          <div style={card}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:12}}>➕ 일정 추가</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <input style={inp} placeholder="날짜 (예: 7월 18일)" value={schedForm.day} onChange={e=>setSchedForm(f=>({...f,day:e.target.value}))}/>
              <input style={inp} placeholder="시간 (예: 09:00–09:30)" value={schedForm.time} onChange={e=>setSchedForm(f=>({...f,time:e.target.value}))}/>
            </div>
            <input style={{...inp,marginBottom:8}} placeholder="프로그램명" value={schedForm.prog} onChange={e=>setSchedForm(f=>({...f,prog:e.target.value}))}/>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:12,color:C.tm,marginBottom:6}}>아이콘 선택</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {ICONS.map(ic=>(
                  <button key={ic} onClick={()=>setSchedForm(f=>({...f,icon:ic}))}
                    style={{width:34,height:34,borderRadius:8,border:"2px solid "+(schedForm.icon===ic?C.sky:"#E2E8F0"),background:schedForm.icon===ic?C.skyL:"#fff",cursor:"pointer",fontSize:16}}>
                    {ic}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={addSched} style={{background:"linear-gradient(135deg,#1E3A5F,#2D6A9F)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:600,cursor:"pointer",fontSize:14}}>
              일정 추가
            </button>
          </div>

          {/* 일정 목록 */}
          {sched.length===0 ? (
            <div style={{...card,textAlign:"center",padding:"3rem 1rem",color:C.tl}}>
              <div style={{fontSize:40,marginBottom:12}}>📅</div>
              <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>아직 등록된 일정이 없어요</div>
              <div style={{fontSize:13}}>위 폼에서 일정을 추가해보세요</div>
            </div>
          ) : (
            (() => {
              const days = [...new Set(sched.map(s=>s.day))];
              const dayColors = [C.sky, C.mint, C.pur, C.coral, C.sun];
              return days.map((day,di)=>{
                const dc = dayColors[di % dayColors.length];
                const dcL = [C.skyL,C.mintL,C.purL,C.coralL,C.sunL][di%5];
                const dcD = [C.skyD,C.mintD,C.purD,C.coralD,C.sunD][di%5];
                const items = sched.filter(s=>s.day===day);
                return (
                  <div key={day} style={card}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                      <div style={{width:12,height:12,borderRadius:"50%",background:dc,flexShrink:0}}/>
                      <div style={{fontSize:16,fontWeight:700}}>{day}</div>
                      <span style={pill(dcL,dcD)}>{items.length}개 프로그램</span>
                    </div>
                    {items.map((it,ii)=>(
                      <div key={it.id} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:ii<items.length-1?"1px solid #F1F5F9":"none",alignItems:"center"}}>
                        <div style={{minWidth:110,fontSize:12,color:C.tm}}>{it.time}</div>
                        <div style={{fontSize:16}}>{it.icon}</div>
                        <div style={{fontSize:14,flex:1}}>{it.prog}</div>
                        <button onClick={()=>delSched(it.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.tl,padding:"2px 4px",flexShrink:0}}>✕</button>
                      </div>
                    ))}
                  </div>
                );
              });
            })()
          )}
        </div>
      )}

      {/* 체크리스트 */}
      {tab==="checklist"&&(
        <div>
          <div style={{...card,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:14,fontWeight:600}}>전체 진행률</div>
              <span style={{fontWeight:700,color:C.mintD,fontSize:18}}>{pct}%</span>
            </div>
            <div style={{...progBar,marginTop:8}}><div style={progFill(pct)}/></div>
            <div style={{fontSize:12,color:C.tl,marginTop:6}}>체크하면 모든 교사에게 실시간 반영됩니다</div>
          </div>
          {cats.map(cat=>(
            <div key={cat} style={card}>
              <div style={{fontSize:16,fontWeight:700,marginBottom:10}}>{cat}</div>
              {cl.filter(c=>c.cat===cat).map(c=>(
                <div key={c.id} onClick={()=>check(c.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #F1F5F9",opacity:c.done?.5:1,cursor:"pointer"}}>
                  <div style={{width:20,height:20,borderRadius:6,border:"2px solid "+(c.done?C.mint:"#CBD5E1"),background:c.done?C.mint:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {c.done&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:14,textDecoration:c.done?"line-through":"none"}}>{c.item}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* 자료실 */}
      {tab==="resources"&&(
        <div>
          <div style={card}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:12}}>🎬 영상 자료</div>
            <div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:10,overflow:"hidden"}}>
              <iframe src="https://www.youtube.com/embed/miKvQ86PZ9I" title="캠프 영상" frameBorder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowFullScreen style={{position:"absolute",top:0,left:0,width:"100%",height:"100%"}}/>
            </div>
          </div>
          <div style={card}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>📂 자료 목록</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
              {RES.map((r,i)=>(
                <div key={i} style={{background:r.bg,borderRadius:12,padding:"1rem"}}>
                  <div style={{fontSize:26,marginBottom:6}}>{r.icon}</div>
                  <div style={{fontSize:13,fontWeight:700,color:r.tc}}>{r.title}</div>
                  <div style={{fontSize:12,color:r.tc,opacity:.8,marginTop:2}}>{r.desc}</div>
                  <div style={{marginTop:8}}><span style={{...pill(r.tc+"22",r.tc),fontSize:10}}>{r.tag}</span></div>
                </div>
              ))}
            </div>
          </div>
          <div style={card}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:10}}>📌 안내 사항</div>
            <ul style={{paddingLeft:18,fontSize:14,lineHeight:2,color:C.tm}}>
              <li>모든 자료는 캠프 2주 전까지 배포 예정입니다</li>
              <li>자료 추가 요청은 교사 게시판에 남겨주세요</li>
              <li>인쇄 자료는 캠프 1주 전 제공됩니다</li>
            </ul>
          </div>
        </div>
      )}

      {/* 게시판 */}
      {tab==="board"&&(
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:16,fontWeight:700}}>💬 교사 게시판</div>
            <span style={pill(C.skyL,C.skyD)}>{coms.length}개</span>
          </div>
          <div style={{fontSize:12,color:C.tl,marginBottom:14}}>모든 교사가 실시간으로 공유하는 게시판입니다</div>
          {coms.length===0&&<div style={{textAlign:"center",padding:"2rem 0",color:C.tl,fontSize:14}}>첫 번째 댓글을 남겨보세요 😊</div>}
          {coms.map(c=>(
            <div key={c.id} style={{background:C.gray,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontWeight:700,fontSize:13}}>👤 {c.name}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,color:C.tl}}>{c.time}</span>
                  <button onClick={()=>delCom(c.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:C.tl,padding:0}}>✕</button>
                </div>
              </div>
              <div style={{fontSize:14,lineHeight:1.6}}>{c.text}</div>
            </div>
          ))}
          <div style={{borderTop:"1px solid #F1F5F9",paddingTop:14,marginTop:4}}>
            <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>✏️ 댓글 작성</div>
            <input style={{...inp,marginBottom:8}} placeholder="이름을 입력하세요" value={name} onChange={e=>setName(e.target.value)}/>
            <textarea style={{...inp,minHeight:80,marginBottom:10,display:"block"}} placeholder="내용을 입력하세요..." value={msg} onChange={e=>setMsg(e.target.value)}/>
            <button onClick={addCom} style={{background:"linear-gradient(135deg,#1E3A5F,#2D6A9F)",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:600,cursor:"pointer",fontSize:14}}>댓글 등록</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
